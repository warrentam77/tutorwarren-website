<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuclear Energy Interactive Quiz</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #dff6ff;
        margin: 0;
        padding: 20px;
        color: #1f2937;
    }
    .quiz-container {
        max-width: 850px;
        margin: 0 auto;
        background: #ffffffcc;
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    h1 { text-align: center; margin-top: 0; color: #075985; }
    .progress { font-size: 18px; font-weight: bold; margin-bottom: 18px; color: #0369a1; }
    .question { font-size: 22px; font-weight: bold; margin-bottom: 22px; line-height: 1.35; }
    .choice {
        display: block;
        width: 100%;
        text-align: left;
        border: 2px solid transparent;
        border-radius: 14px;
        padding: 16px;
        margin: 12px 0;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }
    .choice:hover { transform: translateY(-2px); border-color: #0284c7; }
    .choice:disabled { cursor: default; opacity: 0.9; }
    .feedback { font-size: 54px; text-align: center; min-height: 72px; margin: 12px 0; }
    .explanation {
        display: none;
        background: #eef9ff;
        border-left: 6px solid #0284c7;
        padding: 16px;
        border-radius: 12px;
        font-size: 17px;
        line-height: 1.5;
        margin-top: 12px;
    }
    .next-btn, .restart-btn {
        display: none;
        margin-top: 22px;
        background: #0284c7;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px 22px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
    }
    .next-btn:hover, .restart-btn:hover { background: #0369a1; }
    .score-box { text-align: center; font-size: 22px; line-height: 1.6; }
</style>
</head>
<body>
<div class="quiz-container">
    <h1>Nuclear Energy Interactive Quiz</h1>
    <div id="quiz"></div>
</div>
<script>
const questions = [
  {
    "question": "What is nuclear energy primarily derived from?",
    "choices": [
      "Chemical bonds between atoms",
      "Heat from combustion",
      "Energy stored in atomic nuclei",
      "Movement of electrons"
    ],
    "answer": "C",
    "explanation": "Nuclear energy comes from the energy stored inside atomic nuclei, not from ordinary chemical burning or electron movement."
  },
  {
    "question": "Which process is responsible for energy production in nuclear power stations?",
    "choices": [
      "Fusion",
      "Fission",
      "Combustion",
      "Evaporation"
    ],
    "answer": "B",
    "explanation": "Nuclear power stations use fission, where heavy atomic nuclei such as uranium split and release energy as heat."
  },
  {
    "question": "What initiates nuclear fission in a reactor?",
    "choices": [
      "Proton collision",
      "Electron transfer",
      "Neutron absorption by a nucleus",
      "Heat input"
    ],
    "answer": "C",
    "explanation": "Fission is usually started when a nucleus absorbs a neutron, making it unstable enough to split."
  },
  {
    "question": "What happens to a uranium nucleus during fission?",
    "choices": [
      "It gains mass",
      "It splits into smaller nuclei",
      "It loses electrons only",
      "It becomes stable without change"
    ],
    "answer": "B",
    "explanation": "During fission, a uranium nucleus splits into smaller nuclei and releases energy and neutrons."
  },
  {
    "question": "What is released during a fission reaction?",
    "choices": [
      "Only heat",
      "Only neutrons",
      "Light energy only",
      "Energy and additional neutrons"
    ],
    "answer": "D",
    "explanation": "A fission reaction releases energy and extra neutrons, which can go on to trigger further fission reactions."
  },
  {
    "question": "Why is a chain reaction possible in nuclear fission?",
    "choices": [
      "Neutrons produced can trigger further fission events",
      "Electrons move freely",
      "Heat causes atoms to combine",
      "Fuel disappears instantly"
    ],
    "answer": "A",
    "explanation": "The neutrons released from one fission event can strike other nuclei, causing more fission events and sustaining the reaction."
  },
  {
    "question": "Which condition leads to a stable nuclear reaction?",
    "choices": [
      "No neutrons are produced",
      "Too many neutrons are produced",
      "Too few neutrons are produced",
      "One neutron from each fission causes another fission"
    ],
    "answer": "D",
    "explanation": "A stable controlled chain reaction occurs when, on average, one neutron from each fission causes one further fission."
  },
  {
    "question": "What happens if too many neutrons are produced in a reactor?",
    "choices": [
      "The reaction stops",
      "The reactor cools down",
      "The reactor becomes too hot",
      "Nothing changes"
    ],
    "answer": "C",
    "explanation": "If too many neutrons continue the chain reaction, the fission rate rises and the reactor can produce too much heat."
  },
  {
    "question": "What happens if too few neutrons are produced?",
    "choices": [
      "The reaction speeds up",
      "The chain reaction dies out",
      "The reactor overheats",
      "Energy output increases"
    ],
    "answer": "B",
    "explanation": "If too few neutrons cause further fission, the reaction cannot sustain itself and gradually dies out."
  },
  {
    "question": "Why is nuclear energy considered “low-carbon”?",
    "choices": [
      "It produces oxygen",
      "It uses renewable fuel only",
      "It produces no waste",
      "It releases very little CO₂ during operation"
    ],
    "answer": "D",
    "explanation": "Nuclear power produces electricity without burning fossil fuels, so direct carbon dioxide emissions during operation are very low."
  },
  {
    "question": "What type of power is nuclear energy often described as?",
    "choices": [
      "Intermittent power",
      "Firm power",
      "Renewable power",
      "Temporary power"
    ],
    "answer": "B",
    "explanation": "Nuclear energy is often described as firm power because it can provide reliable electricity continuously."
  },
  {
    "question": "What does “firm power” mean?",
    "choices": [
      "Power that depends on sunlight",
      "Power that is expensive",
      "Power that runs continuously and reliably",
      "Power used only in emergencies"
    ],
    "answer": "C",
    "explanation": "Firm power means electricity that can be supplied reliably when needed, rather than depending mainly on weather conditions."
  },
  {
    "question": "Compared to fossil fuels, nuclear energy produces:",
    "choices": [
      "More CO₂ emissions",
      "Similar CO₂ emissions",
      "Less CO₂ emissions",
      "No energy"
    ],
    "answer": "C",
    "explanation": "Compared with fossil fuel power stations, nuclear power produces much lower carbon dioxide emissions during operation."
  },
  {
    "question": "Which of the following is a major concern about nuclear energy?",
    "choices": [
      "Lack of fuel",
      "Radioactive waste",
      "Low energy output",
      "Excess oxygen production"
    ],
    "answer": "B",
    "explanation": "Radioactive waste is a major concern because it must be safely managed and stored for long periods."
  },
  {
    "question": "Why is radioactive waste a problem?",
    "choices": [
      "It disappears quickly",
      "It is harmless",
      "It can be reused easily",
      "It remains dangerous for a long time"
    ],
    "answer": "D",
    "explanation": "Some radioactive waste remains hazardous for a very long time, so it requires careful shielding, storage and monitoring."
  },
  {
    "question": "What type of risk do nuclear accidents represent?",
    "choices": [
      "High probability, low impact",
      "Low probability, high impact",
      "No risk",
      "Constant small risk"
    ],
    "answer": "B",
    "explanation": "Major nuclear accidents are uncommon, but if they occur, the consequences can be very serious."
  },
  {
    "question": "What are “upfront impacts” of nuclear energy?",
    "choices": [
      "Electricity generation",
      "Waste storage",
      "Mining and construction effects",
      "Cooling processes"
    ],
    "answer": "C",
    "explanation": "Upfront impacts are the effects that occur before operation, such as mining fuel materials and constructing the power station."
  },
  {
    "question": "Why might nuclear energy still be important for the future?",
    "choices": [
      "It replaces all renewables",
      "It produces no heat",
      "It helps provide low-carbon, reliable energy",
      "It is the cheapest energy source"
    ],
    "answer": "C",
    "explanation": "Nuclear energy may support future energy systems because it can provide reliable low-carbon electricity alongside renewables."
  },
  {
    "question": "What is the main advantage of nuclear energy over renewable sources like wind or solar?",
    "choices": [
      "It is cheaper",
      "It produces more waste",
      "It depends on weather",
      "It provides continuous energy"
    ],
    "answer": "D",
    "explanation": "Unlike wind and solar, nuclear power can generate electricity continuously and is not directly dependent on weather conditions."
  },
  {
    "question": "What best describes a nuclear chain reaction?",
    "choices": [
      "A single fission event",
      "A reaction that stops immediately",
      "A series of self-sustaining fission reactions",
      "A chemical reaction"
    ],
    "answer": "C",
    "explanation": "A chain reaction is a continuing series of fission reactions where neutrons from one reaction trigger further reactions."
  }
];
const letters = ['A', 'B', 'C', 'D'];
const choiceColours = ['#fff4cc', '#d9f7d9', '#ffe0e6', '#e6e6ff'];
let current = 0;
let firstAttemptCorrect = 0;
let attemptedThisQuestion = false;
let answeredCorrectly = false;

function renderQuestion() {
    const q = questions[current];
    attemptedThisQuestion = false;
    answeredCorrectly = false;
    document.getElementById('quiz').innerHTML = `
        <div class="progress">Question ${current + 1} of ${questions.length}</div>
        <div class="question">${q.question}</div>
        <div id="choices"></div>
        <div class="feedback" id="feedback"></div>
        <div class="explanation" id="explanation"><strong>Explanation:</strong> ${q.explanation}</div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question</button>
    `;
    const choicesDiv = document.getElementById('choices');
    q.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.style.background = choiceColours[index];
        btn.innerHTML = `<strong>${letters[index]}.</strong> ${choice}`;
        btn.onclick = () => checkAnswer(letters[index], btn);
        choicesDiv.appendChild(btn);
    });
}

function checkAnswer(selected, btn) {
    if (answeredCorrectly) return;
    const q = questions[current];
    if (selected === q.answer) {
        answeredCorrectly = true;
        if (!attemptedThisQuestion) firstAttemptCorrect++;
        document.getElementById('feedback').textContent = '👍';
        document.getElementById('explanation').style.display = 'block';
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.querySelectorAll('.choice').forEach(b => b.disabled = true);
        btn.style.borderColor = '#16a34a';
    } else {
        attemptedThisQuestion = true;
        document.getElementById('feedback').textContent = '👎';
        btn.disabled = true;
        btn.style.borderColor = '#dc2626';
    }
}

function nextQuestion() {
    current++;
    if (current < questions.length) {
        renderQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    const percentage = Math.round((firstAttemptCorrect / questions.length) * 100);
    document.getElementById('quiz').innerHTML = `
        <div class="score-box">
            <h2>Quiz Complete 🎉</h2>
            <p>You answered <strong>${firstAttemptCorrect}</strong> out of <strong>${questions.length}</strong> correctly on the first attempt.</p>
            <p>Your first-attempt correctness is:</p>
            <h2>${percentage}%</h2>
            <button class="restart-btn" style="display:inline-block" onclick="restartQuiz()">Restart Quiz</button>
        </div>
    `;
}

function restartQuiz() {
    current = 0;
    firstAttemptCorrect = 0;
    renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
