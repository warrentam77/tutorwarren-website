<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydropower Interactive Quiz</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#dff5ff;color:#1f2937}.container{max-width:900px;margin:30px auto;padding:24px}.card{background:#ffffffcc;border-radius:18px;padding:28px;box-shadow:0 8px 24px rgba(0,0,0,.12)}h1{text-align:center;margin-top:0;color:#0f4c81}.progress{font-size:18px;font-weight:bold;margin-bottom:18px;color:#075985}.question{font-size:22px;font-weight:bold;line-height:1.45;margin-bottom:22px}.choices{display:grid;gap:14px}button.choice{border:2px solid transparent;border-radius:14px;padding:16px;text-align:left;font-size:18px;cursor:pointer;transition:transform .1s ease,border .2s ease,box-shadow .2s ease}button.choice:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}.choice-a{background:#fff7cc}.choice-b{background:#d9fdd3}.choice-c{background:#ffe0e9}.choice-d{background:#e6ddff}.choice.correct{border-color:#16a34a;background:#bbf7d0!important}.choice.wrong{border-color:#dc2626;background:#fecaca!important}.feedback{margin-top:22px;font-size:20px;font-weight:bold;min-height:32px}.explanation{margin-top:12px;padding:16px;background:#eef9ff;border-left:6px solid #0ea5e9;border-radius:10px;font-size:17px;line-height:1.55;display:none}.next-btn,.restart-btn{margin-top:24px;padding:14px 24px;font-size:18px;font-weight:bold;border:none;border-radius:12px;background:#0ea5e9;color:white;cursor:pointer;display:none}.next-btn:hover,.restart-btn:hover{background:#0284c7}.result{text-align:center;font-size:22px;line-height:1.6}.score{font-size:42px;font-weight:bold;color:#0f766e}
</style>
</head>
<body>
<div class="container"><div class="card"><h1>Hydropower Interactive Quiz</h1><div id="quiz"></div></div></div>
<script>
const questions = [{"question": "Which physical energy transformation sequence best describes a hydroelectric power plant?", "choices": ["Electrical → Mechanical → Potential", "Potential → Kinetic → Mechanical → Electrical", "Thermal → Mechanical → Electrical", "Mechanical → Chemical → Electrical"], "answer": "B", "explanation": "Stored water has gravitational potential energy. As it falls, it becomes kinetic energy, turns a turbine as mechanical energy, and the generator converts this into electrical energy."}, {"question": "In a hydroelectric power station, the head height (h) refers to:", "choices": ["The total volume of water stored in the reservoir", "The length of the turbine blades", "The pressure inside the generator housing", "The vertical distance between the water surface and the turbine"], "answer": "D", "explanation": "Head height is the vertical drop of water from the upper water level to the turbine. A greater head usually means greater pressure and more available energy."}, {"question": "In the hydropower power equation, the variable Q represents:", "choices": ["Electrical efficiency of the turbine", "Reservoir storage capacity", "Water flow rate through the turbine", "Turbine rotational speed"], "answer": "C", "explanation": "In the hydropower equation, Q means the volume flow rate of water passing through the turbine. More water flow gives more available power."}, {"question": "Which type of hydropower system primarily acts as energy storage rather than a primary energy source?", "choices": ["Pumped storage hydropower", "Run-of-river hydropower", "Tidal hydropower", "Micro hydropower"], "answer": "A", "explanation": "Pumped storage uses spare electricity to pump water uphill, then releases it later to generate electricity. It mainly stores energy rather than creating a new primary source."}, {"question": "A key advantage of reservoir-based hydropower plants compared with run-of-river plants is that they:", "choices": ["Produce electricity without turbines", "Provide controllable and reliable electricity output", "Require no large infrastructure", "Depend entirely on rainfall"], "answer": "B", "explanation": "A reservoir stores water, so operators can release water when electricity is needed. This makes output more controllable than a system relying only on natural river flow."}, {"question": "Which environmental concern is most strongly associated with large hydroelectric dams?", "choices": ["Increased geothermal activity", "Atmospheric ozone depletion", "Loss of solar radiation", "Flooding of habitats and farmland"], "answer": "D", "explanation": "Large dams can create reservoirs that flood valleys, habitats and farmland. This can affect wildlife, communities and land use."}, {"question": "Increasing which of the following variables will directly increase the theoretical power output of a hydroelectric plant?", "choices": ["Turbine blade thickness", "Generator voltage", "Water flow rate (Q)", "Transformer efficiency"], "answer": "C", "explanation": "Hydropower output depends strongly on flow rate. If more water passes through the turbine each second, more energy is available to be converted into electricity."}, {"question": "A run-of-river hydropower plant typically differs from a dam-based system because it:", "choices": ["Uses natural river flow with minimal water storage", "Generates electricity only during floods", "Requires large reservoirs", "Depends entirely on tidal forces"], "answer": "A", "explanation": "Run-of-river schemes use the natural flow of a river and normally have little storage. Their output changes more with river conditions."}, {"question": "Which factor explains why hydropower is considered renewable?", "choices": ["Turbines can be recycled", "Generators produce no heat", "The water cycle continuously replenishes rivers and reservoirs", "Dams generate electricity without turbines"], "answer": "C", "explanation": "Hydropower uses water that is naturally replenished by the water cycle through evaporation, rainfall and river flow."}, {"question": "Which component in a hydroelectric system converts mechanical rotational energy into electrical energy?", "choices": ["Penstock", "Turbine", "Reservoir", "Generator"], "answer": "D", "explanation": "The turbine provides rotating mechanical energy. The generator converts this rotation into electrical energy using electromagnetic induction."}, {"question": "Which hydropower system has the most predictable power output due to gravitational interactions between Earth, Moon, and Sun?", "choices": ["Run-of-river systems", "Tidal hydropower systems", "Pumped storage plants", "Micro hydro turbines"], "answer": "B", "explanation": "Tidal hydropower is linked to predictable tidal cycles caused by the gravitational pull of the Moon and Sun."}, {"question": "A major limitation of hydropower expansion worldwide is:", "choices": ["Lack of turbine technology", "High electrical transmission losses", "Low efficiency of hydro turbines", "Limited suitable geographical locations"], "answer": "D", "explanation": "Hydropower needs suitable water flow, head height and geography. Many good sites are already used or are environmentally difficult to develop."}, {"question": "Which parameter in the hydropower equation represents the density of water?", "choices": ["Q", "h", "ρ (rho)", "g"], "answer": "C", "explanation": "The Greek letter ρ, pronounced rho, represents density. In hydropower calculations it usually means the density of water."}, {"question": "If the flow rate doubles while all other variables remain constant, the theoretical power output will:", "choices": ["Double", "Remain constant", "Decrease by half", "Increase by four times"], "answer": "A", "explanation": "Power is directly proportional to flow rate. If Q doubles and everything else stays the same, the theoretical power output also doubles."}, {"question": "Which statement best describes micro hydropower systems?", "choices": ["Systems generating over 1 MW", "Offshore water turbine farms", "Small-scale hydro systems typically up to about 100 kW", "Systems used only in industrial plants"], "answer": "C", "explanation": "Micro hydropower refers to small-scale hydro generation, commonly used for local, rural or off-grid supplies rather than large national generation."}, {"question": "The primary purpose of a penstock in a hydroelectric power plant is to:", "choices": ["Store water behind the dam", "Convert electricity into mechanical energy", "Control electrical output", "Direct water from the reservoir to the turbine"], "answer": "D", "explanation": "A penstock is the pipe or channel that carries pressurised water from the reservoir or intake to the turbine."}, {"question": "Compared with fossil fuel power plants, hydropower plants typically have:", "choices": ["Higher carbon emissions", "Lower operating and maintenance costs after construction", "Shorter operational lifespans", "Lower efficiency levels"], "answer": "B", "explanation": "After construction, hydropower plants do not need to buy fuel and can have long service lives, so operating and maintenance costs are often relatively low."}, {"question": "Which hydropower type relies mostly on flow rate rather than head height?", "choices": ["Reservoir hydropower", "Pumped storage hydropower", "Tidal barrage systems", "Run-of-river hydropower"], "answer": "D", "explanation": "Run-of-river systems usually use the natural river flow with limited storage and often lower head, so flow rate is especially important."}, {"question": "The efficiency of large hydroelectric plants is typically:", "choices": ["Around 40%", "Around 60%", "Often above 85%", "Less than 20%"], "answer": "C", "explanation": "Large hydroelectric plants are among the most efficient electricity generation technologies because water turbines and generators can convert a high proportion of available energy."}, {"question": "Which factor would most significantly reduce hydropower output in a reservoir-based plant?", "choices": ["Reduced rainfall leading to lower reservoir levels", "Increased turbine blade size", "Higher electrical voltage output", "Increased head height"], "answer": "A", "explanation": "Low rainfall can lower reservoir levels and reduce available head and stored water. This directly reduces the energy available for generation."}, {"question": "Which of the following is NOT typically required for hydroelectric generation?", "choices": ["Moving water", "Combustion of fossil fuels", "Turbines", "Generators"], "answer": "B", "explanation": "Hydroelectric generation uses moving water to turn turbines connected to generators. It does not require burning fossil fuels."}, {"question": "The gravitational force responsible for water falling from a reservoir is represented in the power equation by:", "choices": ["ρ", "Q", "h", "g"], "answer": "D", "explanation": "In the hydropower equation, g represents acceleration due to gravity. Gravity is what causes water to fall and release energy."}, {"question": "Which application is most common for pico hydropower systems?", "choices": ["Large urban electricity supply", "Industrial power plants", "Small off-grid communities or remote homes", "National grid stabilization"], "answer": "C", "explanation": "Pico hydropower is very small-scale generation, often suitable for remote homes, farms or small communities near a suitable stream."}, {"question": "One advantage of hydropower for electricity grids is that:", "choices": ["Output can be rapidly increased by releasing more water", "It does not require turbines", "It produces thermal energy directly", "It operates without generators"], "answer": "A", "explanation": "Many hydro plants can increase output quickly by opening gates and releasing more water through the turbine, which helps the grid respond to demand."}, {"question": "Which hydropower technology typically has the least environmental impact?", "choices": ["Reservoir dam systems", "Pumped storage plants", "Run-of-river systems", "Tidal barrage systems"], "answer": "C", "explanation": "Run-of-river schemes normally need much less water storage than large dams, so they often have lower impacts on flooded land and habitats, although local effects still need assessment."}];
let current=0, firstAttemptCorrect=0, attemptedThisQuestion=false, answeredCorrectly=false;
function renderQuestion(){const q=questions[current];attemptedThisQuestion=false;answeredCorrectly=false;document.getElementById("quiz").innerHTML=`<div class="progress">Question ${current+1} of ${questions.length}</div><div class="question">${q.question}</div><div class="choices">${q.choices.map((choice,index)=>{const letter=String.fromCharCode(65+index);return `<button class="choice choice-${letter.toLowerCase()}" onclick="selectAnswer('${letter}', this)"><strong>${letter}.</strong> ${choice}</button>`}).join("")}</div><div id="feedback" class="feedback"></div><div id="explanation" class="explanation"></div><button id="nextBtn" class="next-btn" onclick="nextQuestion()">Next Question</button>`}
function selectAnswer(letter,button){if(answeredCorrectly)return;const q=questions[current],feedback=document.getElementById("feedback"),explanation=document.getElementById("explanation"),nextBtn=document.getElementById("nextBtn");if(!attemptedThisQuestion){attemptedThisQuestion=true;if(letter===q.answer)firstAttemptCorrect++}if(letter===q.answer){answeredCorrectly=true;button.classList.add("correct");feedback.innerHTML="👍 Correct!";explanation.style.display="block";explanation.innerHTML=`<strong>Explanation:</strong> ${q.explanation}`;nextBtn.style.display="inline-block";document.querySelectorAll(".choice").forEach(btn=>{btn.disabled=true;btn.style.cursor="default"})}else{button.classList.add("wrong");button.disabled=true;feedback.innerHTML="👎 Not correct. Try another answer."}}
function nextQuestion(){current++;if(current<questions.length)renderQuestion();else showResult()}
function showResult(){const percentage=Math.round((firstAttemptCorrect/questions.length)*100);document.getElementById("quiz").innerHTML=`<div class="result"><h2>Quiz Completed</h2><p>You answered <strong>${firstAttemptCorrect}</strong> out of <strong>${questions.length}</strong> correctly on the first attempt.</p><div class="score">${percentage}%</div><p>First-attempt correctness score</p><button class="restart-btn" style="display:inline-block" onclick="restartQuiz()">Restart Quiz</button></div>`}
function restartQuiz(){current=0;firstAttemptCorrect=0;renderQuestion()}
renderQuestion();
</script>
</body>
</html>
