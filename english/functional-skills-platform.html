// ─── COMPONENTS ──────────────────────────────────────────────────────────────

function Badge({ color, children }) {
  return (
    <span style={{
      background: color + "22", color, border: `1px solid ${color}44`,
      borderRadius: 20, padding: "2px 10px", fontSize: 11,
      fontFamily: "system-ui, sans-serif", fontWeight: 700,
      letterSpacing: "0.08em", textTransform: "uppercase",
    }}>{children}</span>
  );
}

function SectionTab({ label, active, color, onClick }) {
  return (
    <button onClick={onClick} style={{
      padding: "10px 20px", border: "none", cursor: "pointer",
      background: active ? color : "transparent",
      color: active ? "#fff" : "#666",
      borderRadius: 8, fontFamily: "system-ui, sans-serif",
      fontSize: 13, fontWeight: active ? 700 : 400,
      transition: "all 0.15s", letterSpacing: "0.02em",
    }}>{label}</button>
  );
}

// ─── EXAMPLES PAGE ───────────────────────────────────────────────────────────

function ExamplesPage({ levelIndex }) {
  const level = LEVELS[levelIndex];
  const examples = EXAMPLES[level.id];
  const [open, setOpen] = useState(null);
  const [revealed, setRevealed] = useState({});

  return (
    <div>
      <p style={{ fontFamily: "system-ui, sans-serif", fontSize: 14, color: "#555", marginBottom: 24, lineHeight: 1.6 }}>
        Study these worked examples to understand what is expected at <strong>{level.label}</strong>. Read each text carefully, then reveal the model answer.
      </p>
      {examples.map((ex, i) => {
        const isOpen = open === i;
        return (
          <div key={i} style={{
            background: "#fff", borderRadius: 14,
            border: `1.5px solid ${isOpen ? level.color : "#E5E7EB"}`,
            marginBottom: 14, overflow: "hidden",
            boxShadow: isOpen ? `0 4px 20px ${level.color}18` : "none",
            transition: "all 0.2s",
          }}>
            <button onClick={() => { setOpen(isOpen ? null : i); setRevealed(r => ({ ...r, [i]: false })); }}
              style={{
                width: "100%", background: "none", border: "none",
                padding: "18px 22px", display: "flex", alignItems: "center",
                justifyContent: "space-between", cursor: "pointer", textAlign: "left", gap: 12,
              }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontSize: 20 }}>{ex.icon}</span>
                <div>
                  <div style={{ fontFamily: "Georgia, serif", fontSize: 15, color: "#111" }}>{ex.title}</div>
                  <div style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, color: "#888", marginTop: 2 }}>{ex.component}</div>
                </div>
              </div>
              <span style={{
                width: 28, height: 28, borderRadius: "50%",
                background: isOpen ? level.color : "#F3F4F6",
                color: isOpen ? "#fff" : "#555",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 16, flexShrink: 0, transition: "all 0.2s",
              }}>{isOpen ? "−" : "+"}</span>
            </button>

            {isOpen && (
              <div style={{ padding: "0 22px 22px", borderTop: `1px solid ${level.color}20` }}>
                <p style={{ fontFamily: "system-ui, sans-serif", fontSize: 13, color: "#555", marginTop: 16, marginBottom: 10, fontStyle: "italic" }}>{ex.instruction}</p>

                <div style={{
                  background: "#FAFAFA", border: "1px solid #E5E7EB",
                  borderRadius: 10, padding: "16px 18px", marginBottom: 16,
                  fontFamily: "Georgia, serif", fontSize: 14, lineHeight: 1.8,
                  whiteSpace: "pre-line", color: "#222",
                }}>
                  {ex.text}
                </div>

                <div style={{
                  background: level.light, borderRadius: 10,
                  padding: "14px 16px", marginBottom: 14,
                  border: `1px solid ${level.border}`,
                }}>
                  <div style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, fontWeight: 700, color: level.color, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Question</div>
                  <p style={{ fontFamily: "Georgia, serif", fontSize: 15, margin: 0, color: "#222" }}>{ex.question}</p>
                </div>

                {!revealed[i] ? (
                  <button onClick={() => setRevealed(r => ({ ...r, [i]: true }))}
                    style={{
                      background: level.color, color: "#fff", border: "none",
                      borderRadius: 8, padding: "10px 20px", cursor: "pointer",
                      fontFamily: "system-ui, sans-serif", fontSize: 13, fontWeight: 600,
                    }}>
                    Reveal Model Answer
                  </button>
                ) : (
                  <div>
                    <div style={{
                      background: "#F0FDF4", border: "1px solid #BBF7D0",
                      borderRadius: 10, padding: "14px 16px", marginBottom: 12,
                    }}>
                      <div style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, fontWeight: 700, color: "#15803D", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>✓ Model Answer</div>
                      <p style={{ fontFamily: "Georgia, serif", fontSize: 14, margin: 0, color: "#166534", lineHeight: 1.7 }}>{ex.answer}</p>
                    </div>
                    <div style={{
                      background: "#FFFBEB", border: "1px solid #FDE68A",
                      borderRadius: 10, padding: "12px 16px",
                    }}>
                      <div style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, fontWeight: 700, color: "#92400E", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 4 }}>💡 Tutor Tip</div>
                      <p style={{ fontFamily: "system-ui, sans-serif", fontSize: 13, margin: 0, color: "#78350F", lineHeight: 1.6 }}>{ex.tip}</p>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── QUIZ PAGE ───────────────────────────────────────────────────────────────

function QuizPage({ levelIndex }) {
  const level = LEVELS[levelIndex];
  const questions = QUIZZES[level.id];
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [current, setCurrent] = useState(0);

  const score = submitted ? questions.filter((q, i) => answers[i] === q.answer).length : 0;

  const reset = () => { setAnswers({}); setSubmitted(false); setCurrent(0); };

  const q = questions[current];

  return (
    <div>
      {!submitted ? (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <p style={{ fontFamily: "system-ui, sans-serif", fontSize: 14, color: "#555", margin: 0 }}>
              Question {current + 1} of {questions.length}
            </p>
            <div style={{ display: "flex", gap: 4 }}>
              {questions.map((_, i) => (
                <div key={i} style={{
                  width: 10, height: 10, borderRadius: "50%",
                  background: i === current ? level.color : answers[i] !== undefined ? level.color + "66" : "#E5E7EB",
                  transition: "all 0.2s",
                }} />
              ))}
            </div>
          </div>

          <div style={{
            background: "#fff", borderRadius: 14, padding: "24px 22px",
            border: `1.5px solid ${level.color}30`,
            boxShadow: `0 4px 20px ${level.color}10`,
            marginBottom: 16,
          }}>
            <p style={{ fontFamily: "Georgia, serif", fontSize: 17, lineHeight: 1.6, color: "#111", margin: "0 0 20px" }}>{q.q}</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {q.options.map((opt, oi) => {
                const selected = answers[current] === oi;
                return (
                  <button key={oi} onClick={() => !submitted && setAnswers(a => ({ ...a, [current]: oi }))}
                    style={{
                      background: selected ? level.color + "15" : "#FAFAFA",
                      border: `2px solid ${selected ? level.color : "#E5E7EB"}`,
                      borderRadius: 10, padding: "12px 16px", cursor: "pointer",
                      textAlign: "left", fontFamily: "system-ui, sans-serif",
                      fontSize: 14, color: selected ? level.color : "#333",
                      fontWeight: selected ? 600 : 400,
                      transition: "all 0.15s",
                    }}>
                    <span style={{
                      display: "inline-block", width: 22, height: 22,
                      borderRadius: "50%", background: selected ? level.color : "#E5E7EB",
                      color: selected ? "#fff" : "#888", fontSize: 11, fontWeight: 700,
                      textAlign: "center", lineHeight: "22px", marginRight: 10,
                    }}>
                      {String.fromCharCode(65 + oi)}
                    </span>
                    {opt}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", gap: 10 }}>
            <button onClick={() => setCurrent(c => Math.max(0, c - 1))} disabled={current === 0}
              style={{
                background: "#F3F4F6", border: "none", borderRadius: 8,
                padding: "10px 20px", cursor: current === 0 ? "not-allowed" : "pointer",
                fontFamily: "system-ui, sans-serif", fontSize: 13, color: current === 0 ? "#ccc" : "#444",
              }}>← Back</button>

            {current < questions.length - 1 ? (
              <button onClick={() => setCurrent(c => c + 1)} disabled={answers[current] === undefined}
                style={{
                  background: answers[current] !== undefined ? level.color : "#E5E7EB",
                  border: "none", borderRadius: 8, padding: "10px 20px",
                  cursor: answers[current] !== undefined ? "pointer" : "not-allowed",
                  fontFamily: "system-ui, sans-serif", fontSize: 13, fontWeight: 600,
                  color: answers[current] !== undefined ? "#fff" : "#aaa",
                }}>Next →</button>
            ) : (
              <button onClick={() => setSubmitted(true)}
                disabled={Object.keys(answers).length < questions.length}
                style={{
                  background: Object.keys(answers).length === questions.length ? level.color : "#E5E7EB",
                  border: "none", borderRadius: 8, padding: "10px 24px",
                  cursor: Object.keys(answers).length === questions.length ? "pointer" : "not-allowed",
                  fontFamily: "system-ui, sans-serif", fontSize: 13, fontWeight: 700,
                  color: Object.keys(answers).length === questions.length ? "#fff" : "#aaa",
                }}>Submit Quiz</button>
            )}
          </div>
        </div>
      ) : (
        <div>
          <div style={{
            background: score >= 4 ? "#F0FDF4" : score >= 3 ? "#FFFBEB" : "#FEF2F2",
            border: `1.5px solid ${score >= 4 ? "#BBF7D0" : score >= 3 ? "#FDE68A" : "#FECACA"}`,
            borderRadius: 14, padding: "24px", textAlign: "center", marginBottom: 20,
          }}>
            <div style={{ fontSize: 40, marginBottom: 8 }}>{score >= 4 ? "🎉" : score >= 3 ? "👍" : "📚"}</div>
            <div style={{ fontFamily: "Georgia, serif", fontSize: 26, marginBottom: 6 }}>{score} / {questions.length}</div>
            <div style={{ fontFamily: "system-ui, sans-serif", fontSize: 14, color: "#555" }}>
              {score >= 4 ? "Excellent! Well done." : score >= 3 ? "Good effort — review the ones you missed." : "Keep practising — look at the explanations below."}
            </div>
          </div>

          {questions.map((q, i) => {
            const correct = answers[i] === q.answer;
            return (
              <div key={i} style={{
                background: "#fff", borderRadius: 12,
                border: `1.5px solid ${correct ? "#BBF7D0" : "#FECACA"}`,
                padding: "16px 18px", marginBottom: 10,
              }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 8 }}>
                  <span style={{ fontSize: 18 }}>{correct ? "✅" : "❌"}</span>
                  <p style={{ fontFamily: "Georgia, serif", fontSize: 14, margin: 0, lineHeight: 1.5 }}>{q.q}</p>
                </div>
                {!correct && (
                  <div style={{ marginLeft: 28, marginBottom: 6 }}>
                    <span style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, color: "#DC2626" }}>
                      Your answer: {q.options[answers[i]]}
                    </span>
                    <br />
                    <span style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, color: "#15803D" }}>
                      Correct: {q.options[q.answer]}
                    </span>
                  </div>
                )}
                <div style={{
                  marginLeft: 28, background: "#F8FAFC", borderRadius: 8,
                  padding: "8px 12px", fontFamily: "system-ui, sans-serif",
                  fontSize: 12, color: "#555", lineHeight: 1.5,
                }}>
                  💡 {q.explain}
                </div>
              </div>
            );
          })}

          <button onClick={reset} style={{
            background: level.color, color: "#fff", border: "none",
            borderRadius: 8, padding: "12px 28px", cursor: "pointer",
            fontFamily: "system-ui, sans-serif", fontSize: 14, fontWeight: 600,
            marginTop: 10,
          }}>Try Again</button>
        </div>
      )}
    </div>
  );
}

// ─── MOCK TEST PAGE ───────────────────────────────────────────────────────────

function MockTestPage({ levelIndex }) {
  const level = LEVELS[levelIndex];
  const test = TESTS[level.id];
  const [phase, setPhase] = useState("intro");
  const [sectionIdx, setSectionIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [writingAnswer, setWritingAnswer] = useState("");
  const [timeLeft, setTimeLeft] = useState(test.duration);
  const [showResults, setShowResults] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    if (phase === "test") {
      timerRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) { clearInterval(timerRef.current); setPhase("results"); return 0; }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [phase]);

  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;

  const section = test.sections[sectionIdx];
  const readingSection = test.sections[0];
  const writingSection = test.sections[1];

  const readingScore = readingSection.questions
    ? readingSection.questions.filter((q, i) => answers[i] === q.answer).length
    : 0;

  const wordCount = writingAnswer.trim().split(/\s+/).filter(Boolean).length;

  if (phase === "intro") return (
    <div>
      <div style={{
        background: "#fff", borderRadius: 14, padding: "28px 24px",
        border: `1.5px solid ${level.color}30`, marginBottom: 20,
      }}>
        <h3 style={{ fontFamily: "Georgia, serif", fontSize: 20, margin: "0 0 12px" }}>{test.title}</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
          {[
            { label: "Time allowed", value: `${Math.floor(test.duration / 60)} minutes` },
            { label: "Sections", value: "Reading + Writing" },
            { label: "Reading questions", value: `${readingSection.questions?.length || 0} questions` },
            { label: "Writing task", value: "1 extended task" },
          ].map((item, i) => (
            <div key={i} style={{
              background: level.light, borderRadius: 10,
              padding: "12px 14px", border: `1px solid ${level.border}`,
            }}>
              <div style={{ fontFamily: "system-ui, sans-serif", fontSize: 11, color: level.color, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>{item.label}</div>
              <div style={{ fontFamily: "Georgia, serif", fontSize: 16, marginTop: 3 }}>{item.value}</div>
            </div>
          ))}
        </div>
        <div style={{ background: "#FFFBEB", borderRadius: 10, padding: "14px 16px", marginBottom: 20, border: "1px solid #FDE68A" }}>
          <p style={{ fontFamily: "system-ui, sans-serif", fontSize: 13, margin: 0, color: "#78350F", lineHeight: 1.6 }}>
            <strong>Instructions:</strong> Read the passage carefully before answering the reading questions. For the writing task, plan your answer before you begin. Write in sentences and check your work when finished.
          </p>
        </div>
        <button onClick={() => setPhase("test")} style={{
          background: level.color, color: "#fff", border: "none",
          borderRadius: 8, padding: "13px 28px", cursor: "pointer",
          fontFamily: "system-ui, sans-serif", fontSize: 15, fontWeight: 700,
        }}>Start Test →</button>
      </div>
    </div>
  );

  if (phase === "results") return (
    <div>
      <div style={{
        background: "#F0FDF4", border: "1.5px solid #BBF7D0",
        borderRadius: 14, padding: "24px", textAlign: "center", marginBottom: 24,
      }}>
        <div style={{ fontSize: 36, marginBottom: 8 }}>📋</div>
        <h3 style={{ fontFamily: "Georgia, serif", fontSize: 22, margin: "0 0 6px" }}>Test Complete</h3>
        <p style={{ fontFamily: "system-ui, sans-serif", fontSize: 14, color: "#555", margin: 0 }}>
          Reading: {readingScore}/{readingSection.questions?.length} correct
        </p>
      </div>

      <h4 style={{ fontFamily: "Georgia, serif", fontSize: 16, marginBottom: 14 }}>Reading Answers</h4>
      {readingSection.questions?.map((q, i) => {
        const correct = answers[i] === q.answer;
        return (
          <div key={i} style={{
            background: "#fff", borderRadius: 10,
            border: `1px solid ${correct ? "#BBF7D0" : "#FECACA"}`,
            padding: "12px 16px", marginBottom: 8,
          }}>
            <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
              <span>{correct ? "✅" : "❌"}</span>
              <div>
                <p style={{ fontFamily: "system-ui, sans-serif", fontSize: 13, margin: "0 0 4px", color: "#333" }}>{q.q}</p>
                {!correct && <p style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, color: "#DC2626", margin: "0 0 2px" }}>Your answer: {q.options[answers[i]]}</p>}
                <p style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, color: "#15803D", margin: 0 }}>Correct: {q.options[q.answer]}</p>
              </div>
            </div>
          </div>
        );
      })}

      <h4 style={{ fontFamily: "Georgia, serif", fontSize: 16, margin: "24px 0 10px" }}>Your Writing</h4>
      <div style={{ background: "#fff", border: "1px solid #E5E7EB", borderRadius: 10, padding: "16px", marginBottom: 16, fontFamily: "Georgia, serif", fontSize: 14, lineHeight: 1.8, whiteSpace: "pre-wrap", color: "#333", minHeight: 80 }}>
        {writingAnswer || <em style={{ color: "#aaa" }}>No answer written.</em>}
      </div>

      <h4 style={{ fontFamily: "Georgia, serif", fontSize: 16, marginBottom: 10 }}>Model Answer</h4>
      <div style={{ background: "#F0FDF4", border: "1px solid #BBF7D0", borderRadius: 10, padding: "16px", marginBottom: 20, fontFamily: "Georgia, serif", fontSize: 14, lineHeight: 1.8, whiteSpace: "pre-line", color: "#166534" }}>
        {writingSection.modelAnswer}
      </div>

      <h4 style={{ fontFamily: "Georgia, serif", fontSize: 16, marginBottom: 10 }}>Self-Assessment Checklist</h4>
      <div style={{ background: "#fff", border: "1px solid #E5E7EB", borderRadius: 10, padding: "16px", marginBottom: 20 }}>
        {writingSection.checklist?.map((item, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 0", borderBottom: i < writingSection.checklist.length - 1 ? "1px solid #F3F4F6" : "none" }}>
            <span style={{ fontSize: 16, color: level.color }}>☐</span>
            <span style={{ fontFamily: "system-ui, sans-serif", fontSize: 13, color: "#444" }}>{item}</span>
          </div>
        ))}
      </div>

      <button onClick={() => { setPhase("intro"); setAnswers({}); setWritingAnswer(""); setTimeLeft(test.duration); setSectionIdx(0); }}
        style={{
          background: level.color, color: "#fff", border: "none",
          borderRadius: 8, padding: "12px 24px", cursor: "pointer",
          fontFamily: "system-ui, sans-serif", fontSize: 14, fontWeight: 600,
        }}>Retake Test</button>
    </div>
  );

  return (
    <div>
      {/* Timer bar */}
      <div style={{
        background: "#fff", borderRadius: 10, padding: "10px 16px",
        border: `1px solid ${timeLeft < 120 ? "#FECACA" : "#E5E7EB"}`,
        display: "flex", justifyContent: "space-between", alignItems: "center",
        marginBottom: 20,
      }}>
        <div style={{ display: "flex", gap: 8 }}>
          {test.sections.map((s, i) => (
            <button key={i} onClick={() => setSectionIdx(i)} style={{
              padding: "5px 14px", borderRadius: 6, border: "none",
              background: i === sectionIdx ? level.color : "#F3F4F6",
              color: i === sectionIdx ? "#fff" : "#555",
              fontFamily: "system-ui, sans-serif", fontSize: 12, fontWeight: 600, cursor: "pointer",
            }}>{s.name}</button>
          ))}
        </div>
        <div style={{
          fontFamily: "system-ui, monospace", fontSize: 15, fontWeight: 700,
          color: timeLeft < 120 ? "#DC2626" : "#333",
        }}>
          ⏱ {String(minutes).padStart(2, "0")}:{String(seconds).padStart(2, "0")}
        </div>
      </div>

      {/* Reading section */}
      {sectionIdx === 0 && (
        <div>
          <div style={{ background: "#FAFAFA", border: "1px solid #E5E7EB", borderRadius: 12, padding: "18px", marginBottom: 20, fontFamily: "Georgia, serif", fontSize: 14, lineHeight: 1.85, whiteSpace: "pre-line", color: "#222" }}>
            {section.passage}
          </div>
          {section.questions?.map((q, i) => (
            <div key={i} style={{ background: "#fff", borderRadius: 10, border: "1px solid #E5E7EB", padding: "16px", marginBottom: 12 }}>
              <p style={{ fontFamily: "Georgia, serif", fontSize: 15, margin: "0 0 12px" }}>{i + 1}. {q.q}</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {q.options.map((opt, oi) => (
                  <button key={oi} onClick={() => setAnswers(a => ({ ...a, [i]: oi }))}
                    style={{
                      background: answers[i] === oi ? level.color + "15" : "#FAFAFA",
                      border: `1.5px solid ${answers[i] === oi ? level.color : "#E5E7EB"}`,
                      borderRadius: 8, padding: "9px 14px", cursor: "pointer",
                      textAlign: "left", fontFamily: "system-ui, sans-serif",
                      fontSize: 13, color: answers[i] === oi ? level.color : "#333",
                      fontWeight: answers[i] === oi ? 600 : 400,
                    }}>
                    <span style={{ marginRight: 8, fontWeight: 700 }}>{String.fromCharCode(65 + oi)}.</span>{opt}
                  </button>
                ))}
              </div>
            </div>
          ))}
          <button onClick={() => setSectionIdx(1)} style={{
            background: level.color, color: "#fff", border: "none",
            borderRadius: 8, padding: "11px 24px", cursor: "pointer",
            fontFamily: "system-ui, sans-serif", fontSize: 14, fontWeight: 600, marginTop: 4,
          }}>Continue to Writing →</button>
        </div>
      )}

      {/* Writing section */}
      {sectionIdx === 1 && (
        <div>
          <div style={{ background: level.light, border: `1px solid ${level.border}`, borderRadius: 12, padding: "16px 18px", marginBottom: 18 }}>
            <div style={{ fontFamily: "system-ui, sans-serif", fontSize: 11, fontWeight: 700, color: level.color, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Writing Task</div>
            <p style={{ fontFamily: "Georgia, serif", fontSize: 15, margin: 0, lineHeight: 1.7, color: "#222" }}>{section.prompt}</p>
          </div>
          <textarea
            value={writingAnswer}
            onChange={e => setWritingAnswer(e.target.value)}
            placeholder="Write your answer here..."
            style={{
              width: "100%", minHeight: 200, borderRadius: 12,
              border: "1.5px solid #E5E7EB", padding: "14px 16px",
              fontFamily: "Georgia, serif", fontSize: 14, lineHeight: 1.8,
              color: "#222", resize: "vertical", outline: "none",
              boxSizing: "border-box",
            }}
          />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
            <span style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, color: "#888" }}>
              Word count: {wordCount}
            </span>
            <button onClick={() => { clearInterval(timerRef.current); setPhase("results"); }}
              style={{
                background: level.color, color: "#fff", border: "none",
                borderRadius: 8, padding: "11px 24px", cursor: "pointer",
                fontFamily: "system-ui, sans-serif", fontSize: 14, fontWeight: 700,
              }}>Submit Test</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [levelIdx, setLevelIdx] = useState(0);
  const [section, setSection] = useState("examples");
  const level = LEVELS[levelIdx];

  const sections = [
    { key: "examples", label: "📚 Examples" },
    { key: "quiz", label: "🧠 Quiz" },
    { key: "test", label: "📝 Mock Test" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#F7F6F2", fontFamily: "Georgia, serif" }}>
      {/* Header */}
      <header style={{
        background: "#111827", color: "#fff",
        padding: "32px 24px 28px", textAlign: "center", position: "relative", overflow: "hidden",
      }}>
        <div style={{
          position: "absolute", inset: 0,
          background: `radial-gradient(ellipse at 25% 50%, ${level.color}25 0%, transparent 55%), radial-gradient(ellipse at 75% 30%, ${level.color}12 0%, transparent 50%)`,
          transition: "background 0.4s", pointerEvents: "none",
        }} />
        <div style={{ position: "relative" }}>
          <div style={{ fontSize: 11, letterSpacing: "0.22em", color: "#6B7280", marginBottom: 8, textTransform: "uppercase", fontFamily: "system-ui, sans-serif" }}>Functional Skills English</div>
          <h1 style={{ fontSize: "clamp(22px, 4vw, 36px)", fontWeight: "normal", margin: "0 0 6px", letterSpacing: "-0.02em" }}>Foundation Learning Platform</h1>
          <p style={{ color: "#9CA3AF", fontSize: 13, margin: 0, fontFamily: "system-ui, sans-serif" }}>Examples · Quizzes · Mock Tests — Entry Levels 1, 2 & 3</p>
        </div>
      </header>

      {/* Level selector */}
      <div style={{ background: "#fff", borderBottom: "1px solid #E5E7EB" }}>
        <div style={{ maxWidth: 720, margin: "0 auto", display: "flex", overflowX: "auto" }}>
          {LEVELS.map((l, i) => (
            <button key={l.id} onClick={() => { setLevelIdx(i); setSection("examples"); }}
              style={{
                padding: "14px 24px", border: "none",
                borderBottom: levelIdx === i ? `3px solid ${l.color}` : "3px solid transparent",
                background: "none", cursor: "pointer", whiteSpace: "nowrap",
                fontFamily: "system-ui, sans-serif", fontSize: 13,
                fontWeight: levelIdx === i ? 700 : 400,
                color: levelIdx === i ? l.color : "#666",
                transition: "all 0.15s",
              }}>
              {l.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 720, margin: "0 auto", padding: "24px 16px 60px" }}>
        {/* Level badge */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
          <Badge color={level.color}>{level.tag}</Badge>
          <span style={{ fontFamily: "system-ui, sans-serif", fontSize: 13, color: "#888" }}>{level.label}</span>
        </div>

        {/* Section tabs */}
        <div style={{
          background: "#F3F4F6", borderRadius: 12, padding: 5,
          display: "flex", gap: 4, marginBottom: 24,
        }}>
          {sections.map(s => (
            <SectionTab key={s.key} label={s.label} active={section === s.key} color={level.color} onClick={() => setSection(s.key)} />
          ))}
        </div>

        {/* Content */}
        {section === "examples" && <ExamplesPage levelIndex={levelIdx} />}
        {section === "quiz" && <QuizPage key={`${levelIdx}-quiz`} levelIndex={levelIdx} />}
        {section === "test" && <MockTestPage key={`${levelIdx}-test`} levelIndex={levelIdx} />}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
