<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCSE Maths Foundation вҖ“ MCQ Assessment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      font-family: Georgia, serif;
    }

    /* в”Җв”Җ CARD BASE в”Җв”Җ */
    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      width: 100%;
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* в”Җв”Җ SCREEN VISIBILITY в”Җв”Җ */
    .screen { display: none; }
    .screen.active { display: flex; align-items: center; justify-content: center; }
    body { flex-direction: column; }

    /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
       REGISTRATION SCREEN
    в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
    #screen-register { width: 100%; }
    #register-card {
      max-width: 480px;
      padding: 48px 40px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 3px;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 16px;
    }
    .main-title {
      color: #fff;
      font-size: 34px;
      font-weight: 400;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      letter-spacing: 1px;
      font-family: sans-serif;
      margin-bottom: 24px;
    }
    .divider { height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 28px; }
    .field { margin-bottom: 22px; text-align: left; }
    .field-label {
      display: block;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: sans-serif;
      margin-bottom: 10px;
    }
    .text-input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fff;
      font-size: 16px;
      outline: none;
      font-family: Georgia, serif;
      transition: border-color 0.2s;
    }
    .text-input::placeholder { color: rgba(255,255,255,0.3); }
    .text-input:focus { border-color: rgba(245,158,11,0.6); }
    .tongue-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .tongue-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-family: sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .tongue-btn .flag { font-size: 22px; }
    .tongue-btn:hover { background: rgba(255,255,255,0.1); }
    .tongue-btn.active {
      border: 1.5px solid #f59e0b;
      background: rgba(245,158,11,0.15);
      color: #f59e0b;
    }
    .start-btn {
      margin-top: 10px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-family: Georgia, serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .start-btn:not(:disabled):hover { transform: translateY(-1px); }

    /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
       QUIZ SCREEN
    в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
    #screen-quiz { width: 100%; }
    #quiz-card {
      max-width: 560px;
      padding: 36px 36px 28px;
    }
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .quiz-header-left { display: flex; align-items: center; gap: 10px; }
    .quiz-header-name { color: #fff; font-size: 14px; font-family: sans-serif; font-weight: 600; }
    .quiz-header-lang { color: rgba(255,255,255,0.45); font-size: 12px; font-family: sans-serif; }
    .q-counter { color: #f59e0b; font-family: 'Arial Black', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 1px; }
    .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 100px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #ef4444); border-radius: 100px; transition: width 0.4s ease; }
    .topic-chip {
      display: inline-block;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      color: #f59e0b;
      font-size: 11px;
      font-family: sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 14px;
    }
    .question-text { color: #fff; font-size: 20px; font-weight: 400; line-height: 1.5; margin-bottom: 24px; }
    .choices-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .choice-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      font-family: Georgia, serif;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      width: 100%;
    }
    .choice-btn:hover:not(:disabled) { background: rgba(255,255,255,0.09); }
    .choice-btn.selected { border: 1.5px solid #a78bfa; background: rgba(167,139,250,0.15); color: #a78bfa; }
    .choice-btn.correct  { border: 1.5px solid #22c55e; background: rgba(34,197,94,0.15);  color: #22c55e; }
    .choice-btn.wrong    { border: 1.5px solid #ef4444; background: rgba(239,68,68,0.15);  color: #ef4444; }
    .choice-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      font-size: 12px;
      font-family: sans-serif;
      font-weight: 700;
    }
    .feedback {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid;
      margin-bottom: 16px;
      font-size: 14px;
      font-family: sans-serif;
      font-weight: 600;
      display: none;
    }
    .feedback.correct { background: rgba(34,197,94,0.1); border-color: #22c55e; color: #22c55e; }
    .feedback.wrong   { background: rgba(239,68,68,0.1);  border-color: #ef4444; color: #ef4444; }
    .hint-box {
      display: none;
      align-items: flex-start;
      gap: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .hint-box.visible { display: flex; }
    .hint-flag { font-size: 22px; flex-shrink: 0; }
    .hint-text { color: rgba(255,255,255,0.75); font-size: 14px; font-family: Georgia, serif; line-height: 1.6; font-style: italic; }

    /* в”Җв”Җ EXPLANATION BOX в”Җв”Җ */
    .explanation-box {
      display: none;
      flex-direction: column;
      gap: 10px;
      background: rgba(99,179,237,0.07);
      border: 1px solid rgba(99,179,237,0.25);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }
    .explanation-box.visible { display: flex; }
    .explanation-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #63b3ed;
    }
    .explanation-header .icon { font-size: 15px; }
    .explanation-body {
      color: rgba(255,255,255,0.88);
      font-size: 13.5px;
      font-family: 'Courier New', monospace;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    .explanation-body.rtl {
      direction: rtl;
      text-align: right;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .hint-text.rtl {
      direction: rtl;
      text-align: right;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
    .nav-group { display: flex; gap: 10px; }
    .hint-btn {
      padding: 10px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-family: sans-serif;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.15s, border-color 0.15s;
    }
    .hint-btn:hover { background: rgba(255,255,255,0.13); }
    .hint-btn.speaking {
      background: rgba(245,158,11,0.18);
      border-color: #f59e0b;
      color: #f59e0b;
      animation: pulse-border 1.2s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(245,158,11,0); }
    }
    .sound-wave {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .sound-wave span {
      display: inline-block;
      width: 3px;
      background: #f59e0b;
      border-radius: 2px;
      animation: wave 0.8s ease-in-out infinite;
    }
    .sound-wave span:nth-child(1) { height: 4px;  animation-delay: 0s; }
    .sound-wave span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
    .sound-wave span:nth-child(3) { height: 7px;  animation-delay: 0.3s; }
    .sound-wave span:nth-child(4) { height: 12px; animation-delay: 0.1s; }
    .sound-wave span:nth-child(5) { height: 5px;  animation-delay: 0.25s; }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1.1); }
    }
    /* explanation reading indicator */
    .explanation-header.reading { color: #a5f3fc; }
    .explanation-header.reading .icon-label { animation: pulse-text 1.2s ease-in-out infinite; }
    @keyframes pulse-text { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .nav-btn {
      padding: 10px 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-family: sans-serif;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .nav-btn:not(:disabled):hover { background: rgba(255,255,255,0.1); }
    .submit-btn {
      padding: 10px 22px;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-family: sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .next-btn {
      padding: 10px 22px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-family: sans-serif;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }

    /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
       RESULTS SCREEN
    в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
    #screen-results { width: 100%; }
    #results-card {
      max-width: 520px;
      padding: 40px 36px;
      text-align: center;
    }
    .results-emoji { font-size: 56px; margin-bottom: 8px; }
    .results-name { color: #fff; font-size: 26px; font-weight: 400; margin-bottom: 6px; }
    .results-subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      font-family: sans-serif;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .score-number { font-size: 52px; font-weight: 700; font-family: sans-serif; line-height: 1; display: block; }
    .score-pct    { font-size: 18px; font-weight: 600; font-family: sans-serif; display: block; margin-bottom: 16px; }
    .grade-badge {
      display: inline-block;
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      padding: 5px 18px;
      border-radius: 100px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .results-list { text-align: left; display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
    .result-row {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid;
      background: rgba(255,255,255,0.03);
      gap: 8px;
    }
    .result-icon { font-weight: 700; flex-shrink: 0; }
    .result-q-text { color: rgba(255,255,255,0.7); font-size: 13px; font-family: sans-serif; flex: 1; }
    .result-correct-ans { color: #22c55e; font-size: 12px; font-family: sans-serif; font-weight: 600; }
    .retry-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: Georgia, serif;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .retry-btn:hover { transform: translateY(-1px); }

    @media (max-width: 480px) {
      #register-card, #quiz-card, #results-card { padding: 28px 20px; }
      .main-title { font-size: 26px; }
      .question-text { font-size: 17px; }
    }
  </style>
</head>
<body>

  <!-- в•җв•җв•җв•җв•җв•җ REGISTRATION SCREEN в•җв•җв•җв•җв•җв•җ -->
  <div id="screen-register" class="screen active">
    <div id="register-card" class="card">
      <div class="badge">GCSE</div>
      <h1 class="main-title">Maths Foundation</h1>
      <p class="subtitle">10-Question Assessment</p>
      <div class="divider"></div>

      <div class="field">
        <label class="field-label" for="learner-name">Learner Name</label>
        <input id="learner-name" class="text-input" type="text" placeholder="Enter your full name" autocomplete="off" />
      </div>

      <div class="field">
        <span class="field-label">Mother Tongue</span>
        <div class="tongue-grid">
          <button class="tongue-btn" data-lang="English"    onclick="selectLang(this)"><span class="flag">рҹҮ¬рҹҮ§</span>English</button>
          <button class="tongue-btn" data-lang="French"     onclick="selectLang(this)"><span class="flag">рҹҮ«рҹҮ·</span>French</button>
          <button class="tongue-btn" data-lang="Chinese"    onclick="selectLang(this)"><span class="flag">рҹҮЁрҹҮі</span>Chinese</button>
          <button class="tongue-btn" data-lang="Portuguese" onclick="selectLang(this)"><span class="flag">рҹҮөрҹҮ№</span>Portuguese</button>
          <button class="tongue-btn" data-lang="Italian"    onclick="selectLang(this)"><span class="flag">рҹҮ®рҹҮ№</span>Italian</button>
          <button class="tongue-btn" data-lang="Turkish"    onclick="selectLang(this)"><span class="flag">рҹҮ№рҹҮ·</span>Turkish</button>
          <button class="tongue-btn" data-lang="Arabic"     onclick="selectLang(this)"><span class="flag">рҹҮёрҹҮҰ</span>Arabic</button>
        </div>
      </div>

      <button id="start-btn" class="start-btn" onclick="startQuiz()" disabled>Begin Assessment вҶ’</button>
    </div>
  </div>

  <!-- в•җв•җв•җв•җв•җв•җ QUIZ SCREEN в•җв•җв•җв•җв•җв•җ -->
  <div id="screen-quiz" class="screen">
    <div id="quiz-card" class="card">
      <div class="quiz-header">
        <div class="quiz-header-left">
          <span id="hdr-name" class="quiz-header-name"></span>
          <span id="hdr-lang" class="quiz-header-lang"></span>
        </div>
        <span id="q-counter" class="q-counter">Q 1 / 10</span>
      </div>

      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width:10%"></div>
      </div>

      <div id="topic-chip" class="topic-chip"></div>
      <h2 id="question-text" class="question-text"></h2>
      <div id="choices-list" class="choices-list"></div>

      <div id="feedback" class="feedback"></div>

      <div id="hint-box" class="hint-box">
        <span id="hint-flag" class="hint-flag"></span>
        <p  id="hint-text"  class="hint-text"></p>
      </div>

      <div id="explanation-box" class="explanation-box">
        <div id="explanation-header" class="explanation-header"><span class="icon">рҹ“ҳ</span> <span id="explanation-lang-label" class="icon-label">Step-by-Step Explanation</span></div>
        <div id="explanation-body" class="explanation-body"></div>
      </div>

      <div class="actions">
        <button id="hint-btn" class="hint-btn" onclick="toggleHint()">
          <span id="hint-btn-label">рҹ’Ў Hint</span>
        </button>
        <div class="nav-group">
          <button id="prev-btn"   class="nav-btn"    onclick="goPrev()"   disabled>вҶҗ Prev</button>
          <button id="submit-btn" class="submit-btn" onclick="submitAnswer()" disabled>Submit</button>
          <button id="next-btn"   class="next-btn"   onclick="goNext()">Next вҶ’</button>
        </div>
      </div>
    </div>
  </div>

  <!-- в•җв•җв•җв•җв•җв•җ RESULTS SCREEN в•җв•җв•җв•җв•җв•җ -->
  <div id="screen-results" class="screen">
    <div id="results-card" class="card">
      <div id="results-emoji" class="results-emoji"></div>
      <h2 id="results-name" class="results-name"></h2>
      <p class="results-subtitle">GCSE Maths Foundation В· Results</p>
      <span id="score-number" class="score-number"></span>
      <span id="score-pct"    class="score-pct"></span>
      <div id="grade-badge"   class="grade-badge"></div>
      <div id="results-list"  class="results-list"></div>
      <button class="retry-btn" onclick="resetQuiz()">Try Again</button>
    </div>

      "Ш§ШіШӘШ®ШҜЩ… Ш§Щ„Ш№Щ…Щ„ЩҠШ§ШӘ Ш§Щ„Ш№ЩғШіЩҠШ© Щ„Ш№ШІЩ„ x.\n\nШ§Щ„Ш®Ш·ЩҲШ© 1 вҖ” Ш§Ш·ШұШӯ 7 Щ…ЩҶ ЩғЩ„Ш§ Ш§Щ„Ш·ШұЩҒЩҠЩҶ:\n  3x + 7 вҲ’ 7 = 22 вҲ’ 7\n  3x = 15\n\nШ§Щ„Ш®Ш·ЩҲШ© 2 вҖ” Ш§ЩӮШіЩ… ЩғЩ„Ш§ Ш§Щ„Ш·ШұЩҒЩҠЩҶ Ш№Щ„Щү 3:\n  3x Г· 3 = 15 Г· 3\n  x = 5\n\nШӘШӯЩӮЩӮ: 3(5) + 7 = 15 + 7 = 22 вң“",
      "ЩӮШ§ЩҶЩҲЩҶ Щ…ШіШ§ШӯШ© Ш§Щ„Щ…ШіШӘШ·ЩҠЩ„:\n\nШ§Щ„Щ…ШіШ§ШӯШ© = Ш§Щ„Ш·ЩҲЩ„ Г— Ш§Щ„Ш№ШұШ¶\n\nШ§Щ„Щ…ШіШ§ШӯШ© = 8 ШіЩ… Г— 5 ШіЩ… = 40 ШіЩ…ВІ\n\nШӘЩҶШЁЩҠЩҮ: 26 ШіЩ… ЩҮЩҲ Ш§Щ„Щ…ШӯЩҠШ· вҖ” Щ„Ш§ ШӘШ®Щ„Ш· ШЁЩҠЩҶЩҮ ЩҲШЁЩҠЩҶ Ш§Щ„Щ…ШіШ§ШӯШ©! Ш§Щ„Щ…ШіШ§ШӯШ© ШӘЩҸЩӮШ§Ші ШҜШ§ШҰЩ…Ш§ЩӢ ШЁЩҲШӯШҜШ§ШӘ Щ…ШұШЁШ№Ш© (ШіЩ…ВІ). вң“",
      "Ш§Щ„ЩҲШіЩҠШ· ЩҮЩҲ Ш§Щ„ЩӮЩҠЩ…Ш© Ш§Щ„Щ…ШӘЩҲШіШ·Ш© Ш№ЩҶШҜ ШӘШұШӘЩҠШЁ Ш§Щ„ШЁЩҠШ§ЩҶШ§ШӘ ШӘШөШ§Ш№ШҜЩҠШ§ЩӢ.\n\nШ§Щ„Ш®Ш·ЩҲШ© 1 вҖ” ШұШӘЩ‘ШЁ Ш§Щ„ЩӮЩҠЩ…:\n  2ШҢ 3ШҢ 5ШҢ 7ШҢ 9\n\nШ§Щ„Ш®Ш·ЩҲШ© 2 вҖ” ШЈЩҲШ¬ШҜ Ш§Щ„ЩӮЩҠЩ…Ш© Ш§Щ„Щ…ШӘЩҲШіШ·Ш©:\n  Ш№ШҜШҜ Ш§Щ„ЩӮЩҠЩ… 5ШҢ ШҘШ°ЩҶ Ш§Щ„ЩӮЩҠЩ…Ш© Ш§Щ„Ш«Ш§Щ„Ш«Ш© ЩҮЩҠ Ш§Щ„ЩҲШіЩҠШ·.\n  2ШҢ 3ШҢ [5]ШҢ 7ШҢ 9\n\nШ§Щ„ЩҲШіЩҠШ· = 5 вң“",
      "Ш§Щ„Ш§ШӯШӘЩ…Ш§Щ„ = Ш№ШҜШҜ Ш§Щ„ЩҶШӘШ§ШҰШ¬ Ш§Щ„Щ…ЩҲШ§ШӘЩҠШ© Г· ШҘШ¬Щ…Ш§Щ„ЩҠ Ш§Щ„ЩҶШӘШ§ШҰШ¬ Ш§Щ„Щ…Щ…ЩғЩҶШ©\n\nШҘШ¬Щ…Ш§Щ„ЩҠ Ш§Щ„ЩғШұШ§ШӘ = 3 + 5 + 2 = 10\nШ§Щ„ЩғШұШ§ШӘ Ш§Щ„ШІШұЩӮШ§ШЎ = 5\n\nP(ШІШұЩӮШ§ШЎ) = 5/10 = 1/2\n\nШЁШіЩ‘Ш· ШЁШ§Щ„ЩӮШіЩ…Ш© Ш№Щ„Щү 5: 5Г·5=1ШҢ 10Г·5=2ШҢ ШЈЩҠ 1/2 = 50%. вң“",
      "Ш№ЩҶШҜ Ш¶ШұШЁ ЩӮЩҲЩү ШЁЩҶЩҒШі Ш§Щ„ШЈШіШ§ШіШҢ ШӘЩҸШ¬Щ…Ш№ Ш§Щ„ШЈШіШі.\n\n  2Ві Г— 2ВІ = 2^(3+2) = 2вҒө\n\nШӘШӯЩӮЩӮ ШЁШ§Щ„ШӘЩҲШіЩҠШ№:\n  2Ві = 8\n  2ВІ = 4\n  8 Г— 4 = 32\n  2вҒө = 32 вң“\n\nШ§Щ„ЩӮШ§Ш№ШҜШ© Ш§Щ„ШЈШіШ§ШіЩҠШ©: aбөҗ Г— aвҒҝ = a^(m+n)",
      "Ш§ШіШӘШ®ШҜЩ… Щ…Ш«Щ„Ш« Ш§Щ„ШіШұШ№Ш©-Ш§Щ„Щ…ШіШ§ЩҒШ©-Ш§Щ„ШІЩ…ЩҶ:\n\n  Ш§Щ„ШіШұШ№Ш© = Ш§Щ„Щ…ШіШ§ЩҒШ© Г· Ш§Щ„ШІЩ…ЩҶ\n\n  Ш§Щ„ШіШұШ№Ш© = 120 ЩғЩ… Г· 2 ШіШ§Ш№Ш© = 60 ЩғЩ…/Ші\n\nШ§Щ„Щ…Ш«Щ„Ш« Ш§Щ„ШӘШ°ЩғЩҠШұЩҠ:\n  [    Ш§Щ„Щ…ШіШ§ЩҒШ©    ]\n  [ Ш§Щ„ШіШұШ№Ш© | Ш§Щ„ШІЩ…ЩҶ ]\n\nвҖў Ш§Щ„Щ…ШіШ§ЩҒШ© = Ш§Щ„ШіШұШ№Ш© Г— Ш§Щ„ШІЩ…ЩҶ\nвҖў Ш§Щ„ШіШұШ№Ш© = Ш§Щ„Щ…ШіШ§ЩҒШ© Г· Ш§Щ„ШІЩ…ЩҶ\nвҖў Ш§Щ„ШІЩ…ЩҶ = Ш§Щ„Щ…ШіШ§ЩҒШ© Г· Ш§Щ„ШіШұШ№Ш© вң“",
      "ЩӮШ§ЩҶЩҲЩҶ Ш§Щ„Щ…ШӯЩҠШ· ЩҠШіШӘШ®ШҜЩ… Ш§Щ„ЩӮШ·Шұ (= 2 Г— ЩҶШөЩҒ Ш§Щ„ЩӮШ·Шұ):\n\n  Щ… = ПҖ Г— ЩӮ = ПҖ Г— 2r\n\nШ§Щ„Ш®Ш·ЩҲШ© 1 вҖ” ШЈЩҲШ¬ШҜ Ш§Щ„ЩӮШ·Шұ: ЩӮ = 2 Г— 7 = 14 ШіЩ…\nШ§Щ„Ш®Ш·ЩҲШ© 2 вҖ” Ш§Ш¶ШұШЁ ЩҒЩҠ ПҖ: Щ… = 3.14 Г— 14 = 43.96 ШіЩ…\n\nШЈШ®Ш·Ш§ШЎ ШҙШ§ШҰШ№Ш©:\nвҖў 21.98 ШіЩ… = ПҖ Г— r (Ш§ШіШӘЩҸШ®ШҜЩ… ЩҶШөЩҒ Ш§Щ„ЩӮШ·Шұ ШЁШҜЩ„ Ш§Щ„ЩӮШ·Шұ)\nвҖў 153.86 ШіЩ…ВІ = ПҖ Г— rВІ (ЩҮШ°Ш§ ЩӮШ§ЩҶЩҲЩҶ Ш§Щ„Щ…ШіШ§ШӯШ©!)\nвҖў 49 ШіЩ… = 7 Г— 7 (ЩҶЩҸШіЩҠ ПҖ) вң“",
      "Щ„ШӘЩҲШіЩҠШ№ ЩӮЩҲШіШҢ Ш§Ш¶ШұШЁ Ш§Щ„ШұЩӮЩ… Ш§Щ„Ш®Ш§ШұШ¬ЩҠ ЩҒЩҠ ЩғЩ„ ШӯШҜ ШҜШ§Ш®Щ„ Ш§Щ„ЩӮЩҲШі.\n\n  4(3x вҲ’ 2)\n  = (4 Г— 3x) + (4 Г— вҲ’2)\n  = 12x вҲ’ 8\n\nЩҶЩӮШ§Ш· Щ…ЩҮЩ…Ш©:\nвҖў Ш§Ш¶ШұШЁ ЩҒЩҠ ЩғЩ„Ш§ Ш§Щ„ШӯШҜЩ‘ЩҠЩҶ ШҜШ§Ш®Щ„ Ш§Щ„ЩӮЩҲШі.\nвҖў 4 Г— (вҲ’2) = вҲ’8 ЩҲЩ„ЩҠШі +8 вҖ” Ш§ЩҶШӘШЁЩҮ Щ„Щ„ШҘШҙШ§ШұШ©!\nвҖў 12x вҲ’ 2 Ш®Ш·ШЈ ШҙШ§ШҰШ№ (Ш·ЩҸШұШӯ 4 вҲ’ 2 ШЁШҜЩ„Ш§ЩӢ Щ…ЩҶ 4 Г— 2). вң“"
    ]
  }
};

const flags = { English:"рҹҮ¬рҹҮ§", French:"рҹҮ«рҹҮ·", Chinese:"рҹҮЁрҹҮі", Portuguese:"рҹҮөрҹҮ№", Italian:"рҹҮ®рҹҮ№", Turkish:"рҹҮ№рҹҮ·", Arabic:"рҹҮёрҹҮҰ" };

// в”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let learnerName = "";
let motherTongue = "";
let currentQ = 0;
let selected  = Array(10).fill(null);
let submitted = false;
let hintVisible = false;

// в”Җв”Җ SPEECH в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const langCodeMap = { English: "en-GB", French: "fr-FR", Chinese: "zh-CN", Portuguese: "pt-PT", Italian: "it-IT", Turkish: "tr-TR", Arabic: "ar-SA" };

function stopSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  setHintBtnSpeaking(false);
  setExplanationReading(false);
}

function speak(text, onEnd) {
  if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
  stopSpeech();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = langCodeMap[motherTongue] || "en-GB";
  utter.rate = 0.92;
  utter.pitch = 1.05;

  // Try to pick a voice matching the language
  const voices = window.speechSynthesis.getVoices();
  const match = voices.find(v => v.lang.startsWith(utter.lang.split("-")[0]));
  if (match) utter.voice = match;

  utter.onend = () => { if (onEnd) onEnd(); };
  utter.onerror = () => { if (onEnd) onEnd(); };
  window.speechSynthesis.speak(utter);
}

function setHintBtnSpeaking(on) {
  const btn = document.getElementById("hint-btn");
  const lbl = document.getElementById("hint-btn-label");
  if (on) {
    btn.classList.add("speaking");
    lbl.innerHTML = `рҹ”Ҡ ${hintVisible ? "Hide Hint" : "Hint"}<span class="sound-wave"><span></span><span></span><span></span><span></span><span></span></span>`;
  } else {
    btn.classList.remove("speaking");
    lbl.textContent = hintVisible ? "рҹ”Ү Hide Hint" : "рҹ’Ў Hint";
  }
}

function setExplanationReading(on) {
  const hdr = document.getElementById("explanation-header");
  if (!hdr) return;
  if (on) hdr.classList.add("reading");
  else    hdr.classList.remove("reading");
}

function speakHint() {
  const text = translations[motherTongue].hints[currentQ];
  setHintBtnSpeaking(true);
  speak(text, () => setHintBtnSpeaking(false));
}

function speakExplanation() {
  const text = translations[motherTongue].explanations[currentQ];
  setExplanationReading(true);
  speak(text, () => setExplanationReading(false));
}

// Reload voices (needed in Chrome where voices load asynchronously)
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// в”Җв”Җ REGISTRATION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById("learner-name").addEventListener("input", checkReady);
document.getElementById("learner-name").addEventListener("keydown", e => { if (e.key === "Enter") startQuiz(); });

function selectLang(btn) {
  document.querySelectorAll(".tongue-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  motherTongue = btn.dataset.lang;
  checkReady();
}

function checkReady() {
  const name = document.getElementById("learner-name").value.trim();
  document.getElementById("start-btn").disabled = !(name && motherTongue);
}

function startQuiz() {
  learnerName = document.getElementById("learner-name").value.trim();
  if (!learnerName || !motherTongue) return;
  showScreen("quiz");
  renderQuestion();
}

// в”Җв”Җ QUIZ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + name).classList.add("active");
}

function renderQuestion() {
  stopSpeech();
  const q = questions[currentQ];
  submitted = false;
  hintVisible = false;

  // Header
  document.getElementById("hdr-name").textContent = learnerName;
  document.getElementById("hdr-lang").textContent = flags[motherTongue] + " " + motherTongue;
  document.getElementById("q-counter").textContent = "Q " + (currentQ + 1) + " / 10";

  // Progress
  document.getElementById("progress-fill").style.width = ((currentQ + 1) / 10 * 100) + "%";

  // Topic + question
  document.getElementById("topic-chip").textContent    = q.topic;
  document.getElementById("question-text").textContent = q.question;

  // Choices
  const list = document.getElementById("choices-list");
  list.innerHTML = "";
  q.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (selected[currentQ] === c) btn.classList.add("selected");
    btn.innerHTML = `<span class="choice-letter">${String.fromCharCode(65+i)}</span><span>${c}</span>`;
    btn.onclick = () => selectChoice(c, btn);
    list.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById("feedback");
  fb.style.display = "none";
  fb.className = "feedback";

  // Hint
  document.getElementById("hint-box").classList.remove("visible");
  document.getElementById("hint-flag").textContent = flags[motherTongue];
  const hintTextEl = document.getElementById("hint-text");
  hintTextEl.textContent = translations[motherTongue].hints[currentQ];
  hintTextEl.classList.toggle("rtl", motherTongue === "Arabic");

  // Reset hint button label
  const lbl = document.getElementById("hint-btn-label");
  lbl.textContent = "рҹ’Ў Hint";
  document.getElementById("hint-btn").classList.remove("speaking");

  // Explanation
  document.getElementById("explanation-box").classList.remove("visible");
  document.getElementById("explanation-body").textContent = "";
  setExplanationReading(false);

  // Nav buttons
  document.getElementById("prev-btn").disabled         = currentQ === 0;
  document.getElementById("submit-btn").disabled       = selected[currentQ] === null;
  document.getElementById("submit-btn").style.display  = "inline-block";
  document.getElementById("next-btn").style.display    = "none";
}

function selectChoice(choice, clickedBtn) {
  if (submitted) return;
  selected[currentQ] = choice;
  document.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("selected"));
  clickedBtn.classList.add("selected");
  document.getElementById("submit-btn").disabled = false;
  if (hintVisible) toggleHint();
}

function submitAnswer() {
  if (submitted || selected[currentQ] === null) return;
  submitted = true;

  const q   = questions[currentQ];
  const ans = selected[currentQ];
  const correct = ans === q.answer;

  // Stop any ongoing hint speech
  stopSpeech();

  // Colour choices
  document.querySelectorAll(".choice-btn").forEach(btn => {
    const text = btn.querySelector("span:last-child").textContent;
    btn.classList.remove("selected");
    if (text === q.answer) btn.classList.add("correct");
    else if (text === ans)  btn.classList.add("wrong");
    btn.disabled = true;
  });

  // Feedback
  const fb = document.getElementById("feedback");
  fb.style.display = "block";
  fb.className = "feedback " + (correct ? "correct" : "wrong");
  fb.textContent = correct ? "вң“ Correct! Well done." : "вң— Incorrect. Correct answer: " + q.answer;

  // Explanation (in learner's mother tongue)
  const expBox   = document.getElementById("explanation-box");
  const expBody  = document.getElementById("explanation-body");
  const expLabel = document.getElementById("explanation-lang-label");
  const labelMap = { English:"Step-by-Step Explanation", French:"Explication dГ©taillГ©e", Chinese:"иҜҰз»Ҷи§Јжһҗ", Portuguese:"ExplicaГ§ГЈo detalhada", Italian:"Spiegazione dettagliata", Turkish:"AdДұm AdДұm AГ§Дұklama", Arabic:"ШҙШұШӯ Ш®Ш·ЩҲШ© ШЁШ®Ш·ЩҲШ©" };
  expLabel.textContent = flags[motherTongue] + "  " + labelMap[motherTongue];
  expBody.textContent  = translations[motherTongue].explanations[currentQ];
  expBody.classList.toggle("rtl", motherTongue === "Arabic");
  expBox.classList.add("visible");

  // Auto-read explanation aloud
  speakExplanation();

  // Swap buttons
  document.getElementById("submit-btn").style.display = "none";
  const nextBtn = document.getElementById("next-btn");
  nextBtn.style.display = "inline-block";
  nextBtn.textContent = currentQ === 9 ? "See Results" : "Next вҶ’";
}

function toggleHint() {
  hintVisible = !hintVisible;
  document.getElementById("hint-box").classList.toggle("visible", hintVisible);
  const lbl = document.getElementById("hint-btn-label");

  if (hintVisible) {
    lbl.textContent = "рҹ”Ү Hide Hint";
    // Speak the hint question in the mother tongue
    speakHint();
  } else {
    stopSpeech();
    lbl.textContent = "рҹ’Ў Hint";
  }
}

function goPrev() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function goNext() {
  if (currentQ < 9) { currentQ++; renderQuestion(); }
  else showResults();
}

// в”Җв”Җ RESULTS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showResults() {
  stopSpeech();
  showScreen("results");

  const score = selected.filter((s, i) => s === questions[i].answer).length;
  const pct   = Math.round(score / 10 * 100);
  const grade = pct >= 90 ? "Distinction" : pct >= 70 ? "Merit" : pct >= 50 ? "Pass" : "Needs Improvement";
  const color = pct >= 70 ? "#22c55e" : pct >= 50 ? "#f59e0b" : "#ef4444";

  document.getElementById("results-emoji").textContent = pct >= 70 ? "рҹҺү" : pct >= 50 ? "рҹ‘Қ" : "рҹ“–";
  document.getElementById("results-name").textContent  = learnerName;

  const sn = document.getElementById("score-number");
  sn.textContent = score + "/10";
  sn.style.color = color;

  const sp = document.getElementById("score-pct");
  sp.textContent = pct + "%";
  sp.style.color = color;

  const gb = document.getElementById("grade-badge");
  gb.textContent      = grade;
  gb.style.background = color;

  const list = document.getElementById("results-list");
  list.innerHTML = "";
  questions.forEach((q, i) => {
    const correct = selected[i] === q.answer;
    const row = document.createElement("div");
    row.className = "result-row";
    row.style.borderColor = correct ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)";
    row.innerHTML = `
      <span class="result-icon" style="color:${correct ? "#22c55e" : "#ef4444"}">${correct ? "вң“" : "вң—"}</span>
      <span class="result-q-text">Q${i+1}: ${q.topic}</span>
      ${!correct ? `<span class="result-correct-ans">вҶ’ ${q.answer}</span>` : ""}
    `;
    list.appendChild(row);
  });
}

function resetQuiz() {
  stopSpeech();
  selected     = Array(10).fill(null);
  currentQ     = 0;
  submitted    = false;
  hintVisible  = false;
  learnerName  = "";
  motherTongue = "";
  document.getElementById("learner-name").value = "";
  document.querySelectorAll(".tongue-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("start-btn").disabled = true;
  showScreen("register");
}
</script>
